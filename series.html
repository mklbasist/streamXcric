<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Series Watch</title>

  <!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=VT323&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="series-watch-page">

<div style="text-align: center; margin-bottom: 20px;">
  <button class="back-btn" onclick="window.location.href='index.html#testArchive">
    <span>← Back</span>
    <div class="back-btn-overlay"></div>
  </button>
</div>

    <!-- VIDEO PLAYER -->
    <div class="watch-player">
  <iframe
    id="videoFrame"
    src=""
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen
    playsinline
    allow="encrypted-media"
    style="width: 100%; height: auto; aspect-ratio: 16/9; border: none;">
  </iframe>
</div>

    <!-- EPISODES / HIGHLIGHTS -->
    <section class="watch-episodes">

      <div class="episodes-top">
        <!-- TEST MATCH DROPDOWN (LEFT) -->
        <select id="testSelect"></select>
      </div>

      <!-- DAY LIST -->
      <div class="episodes-list" id="episodesList">
        <!-- injected by JS -->
      </div>

    </section>

  </div>
  
  <script src="series.js"></script>
</body>
</html>
