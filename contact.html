<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us – streamXcric</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<header class="static-header">
  <a href="index.html" class="back-btn">⬅ Back</a>
  <h2>📞 Contact Us</h2>
</header>

<section style="max-width:600px; margin:auto; padding:40px 20px;">
  <p style="text-align:center; color:#666; margin-bottom:30px;">Have questions or report copyright issues? We're here to help.</p>

  <form action="https://formspree.io/f/xykojanb" method="POST" style="display:flex; flex-direction:column; gap:15px;" id="contactForm">
    
    <input type="text" name="name" placeholder="Your Name" required style="padding:14px 16px; border:none; border-radius:12px; background:#f0f0f0; font-size:16px;">
    
    <input type="email" name="email" placeholder="Your Email" required style="padding:14px 16px; border:none; border-radius:12px; background:#f0f0f0; font-size:16px;">
    
    <select name="category" required style="padding:14px 16px; border:none; border-radius:12px; background:#f0f0f0; font-size:16px;">
      <option value="">Select Category</option>
      <option value="feedback">General Feedback</option>
      <option value="copyright">Copyright Takedown</option>
      <option value="bug">Bug Report</option>
      <option value="other">Other</option>
    </select>
    
    <textarea name="message" placeholder="Your Message..." rows="6" required style="padding:14px 16px; border:none; border-radius:12px; background:#f0f0f0; font-size:16px; resize:none;"></textarea>
    
    <button type="submit" style="padding:14px; background:linear-gradient(135deg, #3df2e0, #00d4ff); color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px;">Send Message</button>
  </form>

  <div id="successMessage" style="display:none; margin-top:20px; padding:15px; background:#d4edda; color:#155724; border-radius:8px; text-align:center;">
    ✅ Thank you! We'll review your message and get back to you within 48 hours.
  </div>

  <p style="text-align:center; margin-top:30px; color:#666;">Response Time: Within 48 hours</p>
</section>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  const category = document.querySelector('select[name="category"]').value;
  const successDiv = document.getElementById('successMessage');
  
  const messages = {
    feedback: '✅ Thanks for your feedback! We appreciate your input.',
    copyright: '✅ Copyright takedown received. We\'ll review it carefully within 48 hours.',
    bug: '✅ Bug report submitted. Our team will investigate and fix it ASAP.',
    other: '✅ Message received. We\'ll get back to you soon!'
  };
  
  setTimeout(() => {
    successDiv.innerText = messages[category] || messages.other;
    successDiv.style.display = 'block';
  }, 500);
});
</script>

</body>
</html>
